apiVersion: apps/v1
kind: Deployment
metadata:
  name: founderbrain-backend
  namespace: founderbrain
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: founderbrain-backend
  template:
    metadata:
      labels:
        app: founderbrain-backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              value: {{ .Values.database.url | quote }}
            - name: DB_USERNAME
              value: {{ .Values.database.username | quote }}
            - name: DB_PASSWORD
              value: {{ .Values.database.password | quote }}
            - name: JWT_SECRET
              value: {{ .Values.jwt.secret | quote }}
            - name: ML_SERVICE_URL
              value: "http://founderbrain-ml:8000"
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: founderbrain-backend
  namespace: founderbrain
spec:
  selector:
    app: founderbrain-backend
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer
